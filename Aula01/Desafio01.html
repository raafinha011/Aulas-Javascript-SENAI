<body>
    <h1>fazendo operações com numeros</h1>
    <hr>
    <script>
        window.alert("Seja bem-vindo ao site");
        let num1 = parseFloat(window.prompt("QUAL É O PRIMEIRO NUMERO?"));
        let num2 = parseFloat(window.prompt("QUAL É O SEGUNDO NUMERO?"));
        let resultado = 0
        let resposta = window.confirm("qual a operação ?");

        if (resposta == true){
          resultado = num1 + num2

        }else{
         resultado = num1 - num2
        }
        window.alert(resultado)
    </script>
