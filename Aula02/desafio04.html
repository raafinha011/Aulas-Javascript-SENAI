    <p>Aprender é muito legal</p>

    </div>
    <script>
        const tags_p = document.getElementsByTagName('p');

        console.log("MINHAS TAGS <p>", tags_p);
        let tag_p_1 = tags_p[0]
        let tag_p_2 = tags_p[1]
        let tag_p_3 = tags_p[2]

        tag_p_1.style.backgroundColor = "green";
        tag_p_1.style.color = "white";
        tag_p_2.style.backgroundColor = "black";
        tag_p_2.style.color = "purple";
        tag_p_3.style.backgroundColor = "pink";
        tag_p_3.style.color = "blue";


        function trocar_imagem(){
        const tags_img = document.getElementsByTagName('img');
        let tag_img_1 = tags_img[0]


            if (tag_img_1.title == "cachorrinho") {
            tag_img_1.title = "Kuromi";
            tag_img_1.src="img/a13f13da6c473999ab9e5155abe70c5e.jpg"


            }
         else {
            tag_img_1.title = "cachorrinho";
            tag_img_1.src="img/7b4df7e626b806da4eff122774841f1f.jpg"



         }
        }
      






    


    </script>
